<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Trends - Real Estate Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        select option {
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .btn.btn-danger {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .chart-container {
            flex: 1;
            position: relative;
            width: 100%;
            min-height: 200px;
        }

        #trackerStatusBadge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        #trackerStatusBadge.running {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border-color: rgba(34, 197, 94, 0.3);
        }

        /* Checkpoint UI */
        #checkpointBadge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
            display: none;
            cursor: help;
        }

        /* Custom Dropdown Overlays */
        .custom-dropdown-group {
            position: relative;
            min-width: 250px;
        }

        .dropdown-trigger {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .dropdown-trigger:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .dropdown-trigger .arrow {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
            opacity: 0.6;
        }

        .dropdown-trigger.active .arrow {
            transform: rotate(180deg);
        }

        .dropdown-overlay.active {
            display: flex;
            flex-direction: column;
        }

        .dropdown-overlay {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 320px;
            background: #111827;
            /* Merger dark background */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown-search {
            padding: 10px;
            background-color: #111827;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .search-field {
            width: 100%;
            background-color: #030712;
            /* Merger input background */
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 12px;
            border-radius: 6px;
            outline: none;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        .search-field:focus {
            border-color: var(--accent);
        }

        .checklist-container {
            max-height: 420px;
            overflow-y: auto;
            background: #111827;
            padding: 5px;
        }

        /* Scrollbar styling */
        .checklist-container::-webkit-scrollbar {
            width: 6px;
        }

        .checklist-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .checklist-group {
            margin-bottom: 8px;
        }

        .checklist-group-header {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            padding: 5px 8px;
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 20px;
            cursor: pointer;
            gap: 8px;
            transition: background 0.2s;
            font-size: 0.9rem;
            border-radius: 4px;
        }

        .checklist-item.province-level {
            padding-left: 8px;
            font-weight: 500;
        }

        .checklist-item:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .checklist-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .checklist-item input[type="checkbox"]:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .sub-zones-container {
            display: none;
            flex-direction: column;
            padding-left: 15px;
        }

        .sub-zones-container.expanded {
            display: flex;
        }

        .toggle-zones-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 5px;
            font-size: 0.8rem;
        }

        .toggle-zones-btn:hover {
            color: white;
        }

        /* Zona con sub-zonas dentro de la lista de zonas */
        .sub-zone-group {
            width: 100%;
        }

        .sub-zone-group .sub-zones-container {
            padding-left: 24px;
        }

        .zone-expandable-header {
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 20px;
            gap: 8px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .zone-expandable-header:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        /* --- LOG TERMINAL STYLES --- */
        .terminal-container {
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            height: 250px;
            flex-shrink: 0;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a7f3d0;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .terminal-container::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .terminal-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .log-entry {
            line-height: 1.4;
            word-wrap: break-word;
        }

        .log-entry.error {
            color: #fca5a5;
        }

        .log-entry.warn {
            color: #fde047;
        }

        .log-entry.success {
            color: #6ee7b7;
        }

        .dropdown-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>📉 Market Trends Tracker</h1>
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-top: 5px;">
                    Inventario Semanal por Provincias y Zonas Geográficas
                </div>
            </div>

            <div class="controls">
                <span id="checkpointBadge" title="Hay un guardado reciente disponible">💾 Checkpoint Disponible</span>
                <span id="trackerStatusBadge">Tracker: Idle</span>
                <button class="btn" id="resumeTrackerBtn" onclick="resumeTracker()"
                    style="display: none; background: linear-gradient(135deg, #f59e0b, #d97706);">Reanudar</button>
                <button class="btn" id="startTrackerBtn" onclick="toggleTracker()">Iniciar Escaneo Global</button>
                <button class="btn"
                    style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);"
                    onclick="window.location.href='/api/export_csv'">Exportar CSV</button>
            </div>
        </div>

        <div class="header" style="justify-content: flex-start; overflow: visible; z-index: 50;">
            <div class="controls" style="overflow: visible;">
                <div class="custom-dropdown-group" id="zoneDropdownGroup">
                    <div class="dropdown-trigger" id="zoneDropdownTrigger">
                        <span>Seleccionar Zonas...</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="dropdown-overlay" id="zoneDropdownOverlay">
                        <div class="dropdown-search">
                            <input type="text" id="zoneSearch" class="search-field"
                                placeholder="Buscar provincia o zona..." autocomplete="off">
                        </div>
                        <div class="checklist-container" id="zoneChecklist">
                            <!-- Populated via JS -->
                        </div>
                        <div class="dropdown-footer"
                            style="padding: 12px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.05);">
                            <button class="btn" style="padding: 6px 12px; font-size: 0.85rem;"
                                onclick="applyZoneSelection()">Aplicar y Filtrar</button>
                            <span id="selectionCount" style="font-size: 0.85rem; color: var(--text-muted);">0
                                seleccionadas</span>
                        </div>
                    </div>
                </div>

                <select id="operationSelect" onchange="drawChart()">
                    <option value="both">Venta y Alquiler</option>
                    <option value="venta">Solo Venta</option>
                    <option value="alquiler">Solo Alquiler</option>
                </select>
            </div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <canvas id="trendsChart"></canvas>
            </div>

            <div class="terminal-container" id="logContainer">
                <div class="log-entry" style="color: var(--text-muted);">[System] Esperando inicio del tracker...</div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let provinceData = {};  // { province: { zone: [subzones] } }
        let chartInstance = null;
        let isTrackerRunning = false;

        // Selection key format: "Province|Zone|Subzone" (subzone='' for zone-level entries)
        let selectedZones = new Set();

        const COLORS = [
            '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
            '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#14b8a6',
            '#a855f7', '#64748b'
        ];

        // Polling para el estado del tracker
        setInterval(checkTrackerStatus, 5000);

        // SocketIO Setup
        const socket = io();
        const logContainer = document.getElementById('logContainer');

        socket.on('log_update', (data) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            let msg = data.message;
            if (msg.includes('ERR:') || msg.includes('Error') || msg.includes('Failed') || msg.includes('CRITICAL')) {
                entry.classList.add('error');
            } else if (msg.includes('WARN:') || msg.includes('Skipping')) {
                entry.classList.add('warn');
            } else if (msg.includes('Found') || msg.includes('Saving Checkpoint') || msg.includes('Completed')) {
                entry.classList.add('success');
            }

            entry.textContent = msg;
            logContainer.appendChild(entry);

            if (logContainer.children.length > 300) {
                logContainer.removeChild(logContainer.firstChild);
            }
            logContainer.scrollTop = logContainer.scrollHeight;
        });

        // Global dropdown click outside listener
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown-group')) {
                document.getElementById('zoneDropdownOverlay').classList.remove('active');
            }
        });

        async function init() {
            setupDropdown();

            await Promise.all([
                fetchData(),
                checkTrackerStatus()
            ]);

            provinceData = buildProvinceDataFromRawData(rawData);
            populateChecklist();
            applyZoneSelection();
        }

        function setupDropdown() {
            const trigger = document.getElementById('zoneDropdownTrigger');
            const overlay = document.getElementById('zoneDropdownOverlay');
            const search = document.getElementById('zoneSearch');

            trigger.addEventListener('click', () => {
                const isActive = overlay.classList.toggle('active');
                trigger.classList.toggle('active', isActive);
            });

            search.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const groups = document.querySelectorAll('.checklist-group');
                const allDiv = document.getElementById('selectAllDiv');

                if (allDiv) allDiv.style.display = term ? 'none' : 'flex';

                groups.forEach(group => {
                    const provLabelEl = group.querySelector('.checklist-group-header label');
                    const provText = provLabelEl ? provLabelEl.textContent.toLowerCase() : '';
                    const subContainer = group.querySelector(':scope > .sub-zones-container');
                    const toggleBtn = group.querySelector(':scope > .checklist-group-header .toggle-zones-btn');

                    let anyVisible = provText.includes(term);

                    // Leaf zones (direct .checklist-item children of subContainer)
                    if (subContainer) {
                        subContainer.querySelectorAll(':scope > .checklist-item').forEach(item => {
                            const itemText = item.querySelector('label') ? item.querySelector('label').textContent.toLowerCase() : '';
                            const visible = itemText.includes(term) || provText.includes(term);
                            item.style.display = visible ? 'flex' : 'none';
                            if (visible) anyVisible = true;
                        });

                        // Zone groups (expandable zones with subzones)
                        subContainer.querySelectorAll(':scope > .sub-zone-group').forEach(wrapper => {
                            const zoneLabel = wrapper.querySelector('.zone-expandable-header label');
                            const zoneText = zoneLabel ? zoneLabel.textContent.toLowerCase() : '';
                            const subSubContainer = wrapper.querySelector('.sub-zones-container');
                            let zoneVisible = zoneText.includes(term) || provText.includes(term);

                            if (subSubContainer) {
                                subSubContainer.querySelectorAll('.checklist-item').forEach(szItem => {
                                    const szLabel = szItem.querySelector('label');
                                    const szText = szLabel ? szLabel.textContent.toLowerCase() : '';
                                    const visible = szText.includes(term) || zoneText.includes(term) || provText.includes(term);
                                    szItem.style.display = visible ? 'flex' : 'none';
                                    if (visible) zoneVisible = true;
                                });
                                if (term && zoneVisible) subSubContainer.classList.add('expanded');
                                else if (!term) subSubContainer.classList.remove('expanded');
                            }

                            wrapper.style.display = zoneVisible ? 'block' : 'none';
                            if (zoneVisible) anyVisible = true;
                        });
                    }

                    group.style.display = anyVisible ? 'block' : 'none';

                    if (subContainer && toggleBtn) {
                        if (term && anyVisible) {
                            subContainer.classList.add('expanded');
                            toggleBtn.textContent = '▲';
                        } else if (!term) {
                            subContainer.classList.remove('expanded');
                            toggleBtn.textContent = '▼';
                        }
                    }
                });
            });
        }

        async function fetchProvinces() {
            try {
                const response = await fetch('/api/provinces');
                const data = await response.json();
                provinceData = data.provinces || {};
            } catch (err) {
                console.error("Failed to load provinces:", err);
            }
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/trends');
                rawData = await response.json();
                console.log("Loaded Trends:", rawData.length, "records");
            } catch (err) {
                console.error("Failed to load trends:", err);
            }
        }

        /**
         * Construye el árbol province → zone → [subzones] directamente desde
         * los registros del DB (rawData), en lugar de limitarse al fichero de
         * mapping. Esto expone todas las zonas y sub-zonas reales que hay en la BD.
         */
        function buildProvinceDataFromRawData(data) {
            const pd = {};
            data.forEach(d => {
                if (!d.province || !d.zone) return;
                if (!pd[d.province]) pd[d.province] = {};
                if (!pd[d.province][d.zone]) pd[d.province][d.zone] = [];
                const sz = d.subzone || '';
                if (sz && !pd[d.province][d.zone].includes(sz)) {
                    pd[d.province][d.zone].push(sz);
                }
            });
            // Ordenar provincias, zonas y sub-zonas alfabéticamente
            const sorted = {};
            Object.keys(pd).sort().forEach(prov => {
                sorted[prov] = {};
                Object.keys(pd[prov]).sort().forEach(zone => {
                    sorted[prov][zone] = pd[prov][zone].sort();
                });
            });
            return sorted;
        }

        async function checkTrackerStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                isTrackerRunning = data.status === 'running';

                const badge = document.getElementById('trackerStatusBadge');
                const btn = document.getElementById('startTrackerBtn');

                const cpRes = await fetch('/api/checkpoint');
                const cpData = await cpRes.json();
                const cpBadge = document.getElementById('checkpointBadge');
                const resumeBtn = document.getElementById('resumeTrackerBtn');

                if (isTrackerRunning) {
                    badge.className = 'running';
                    badge.innerText = 'Tracker: Escaneando...';
                    btn.classList.add('btn-danger');
                    btn.innerText = 'Detener Escaneo';
                    resumeBtn.style.display = 'none';
                } else {
                    badge.className = '';
                    badge.innerText = 'Tracker: Inactivo';
                    btn.classList.remove('btn-danger');
                    btn.innerText = 'Iniciar Escaneo Global';

                    if (cpData.available) {
                        cpBadge.style.display = 'inline-block';
                        cpBadge.title = `Checkpoint Index: ${cpData.data.last_index} (${cpData.data.date_record})`;
                        resumeBtn.style.display = 'inline-block';
                    } else {
                        cpBadge.style.display = 'none';
                        resumeBtn.style.display = 'none';
                    }
                }
            } catch (e) { }
        }

        async function toggleTracker() {
            if (isTrackerRunning) {
                await fetch('/api/stop_tracker', { method: 'POST' });
            } else {
                await fetch('/api/start_tracker', { method: 'POST' });
            }
            setTimeout(checkTrackerStatus, 1500);
            setTimeout(fetchData, 45000);
        }

        async function resumeTracker() {
            if (!isTrackerRunning) {
                await fetch('/api/resume_tracker', { method: 'POST' });
                setTimeout(checkTrackerStatus, 1500);
                document.getElementById('checkpointBadge').style.display = 'none';
            }
        }

        function populateChecklist() {
            const container = document.getElementById('zoneChecklist');
            container.innerHTML = '';

            // Pre-select Default: Madrid > (Toda la provincia)
            if (provinceData['Madrid'] && provinceData['Madrid']['(Toda la provincia)'] !== undefined) {
                selectedZones.add('Madrid|(Toda la provincia)|');
            }

            const provinces = Object.keys(provinceData).sort();

            // Fallback: seleccionar el primero si nada fue seleccionado
            if (selectedZones.size === 0 && provinces.length > 0) {
                const firstProv = provinces[0];
                const firstZones = Object.keys(provinceData[firstProv] || {});
                if (firstZones.length > 0) {
                    selectedZones.add(`${firstProv}|${firstZones[0]}|`);
                }
            }

            // Select All option
            const allDiv = document.createElement('div');
            allDiv.className = 'checklist-item';
            allDiv.id = 'selectAllDiv';
            allDiv.style.borderBottom = '1px solid rgba(255, 255, 255, 0.05)';
            allDiv.style.marginBottom = '5px';
            allDiv.style.fontWeight = 'bold';
            allDiv.innerHTML = '<input type="checkbox" id="selectAllZones" style="margin-right:8px;"> <label for="selectAllZones" style="cursor:pointer; flex:1;">Todas las zonas</label>';
            allDiv.onclick = (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const cb = allDiv.querySelector('input');
                    cb.checked = !cb.checked;
                    toggleAllZones(cb.checked);
                } else {
                    toggleAllZones(e.target.checked);
                }
            };
            container.appendChild(allDiv);

            provinces.forEach(prov => {
                const zones = provinceData[prov] || {};  // { zoneName: [subzones] }
                const zoneNames = Object.keys(zones);
                const group = document.createElement('div');
                group.className = 'checklist-group';

                // Province header
                const header = document.createElement('div');
                header.className = 'checklist-group-header';

                const provCb = document.createElement('input');
                provCb.type = 'checkbox';
                provCb.id = `prov_${prov}`;
                provCb.className = 'prov-cb';

                const provLabel = document.createElement('label');
                provLabel.htmlFor = `prov_${prov}`;
                provLabel.textContent = prov;
                provLabel.style.cursor = 'pointer';
                provLabel.style.flex = '1';

                const hasZones = zoneNames.length > 0;
                let toggleBtn = null;
                if (hasZones) {
                    toggleBtn = document.createElement('button');
                    toggleBtn.className = 'toggle-zones-btn';
                    toggleBtn.textContent = '▼';
                    toggleBtn.title = `Ver ${zoneNames.length} zonas`;
                }

                header.appendChild(provCb);
                header.appendChild(provLabel);
                if (toggleBtn) header.appendChild(toggleBtn);
                group.appendChild(header);

                // All selectable checkboxes under this province (for parent state tracking)
                const allProvCbs = [];
                let subContainer = null;

                if (hasZones) {
                    subContainer = document.createElement('div');
                    subContainer.className = 'sub-zones-container';

                    zoneNames.forEach(zoneName => {
                        const subzones = zones[zoneName];  // [] or ["sz1","sz2",...]
                        const zoneKey = `${prov}|${zoneName}|`;  // zone-level key (subzone='')

                        if (!subzones || subzones.length === 0) {
                            // LEAF ZONE — simple checkbox item
                            const item = document.createElement('div');
                            item.className = 'checklist-item';

                            const cbox = document.createElement('input');
                            cbox.type = 'checkbox';
                            cbox.value = zoneKey;
                            cbox.id = `zone_${prov}_${zoneName}`;
                            cbox.className = 'zone-cb';
                            cbox.checked = selectedZones.has(zoneKey);

                            const zLabel = document.createElement('label');
                            zLabel.htmlFor = cbox.id;
                            zLabel.textContent = zoneName;
                            zLabel.style.cursor = 'pointer';
                            zLabel.style.flex = '1';

                            item.appendChild(cbox);
                            item.appendChild(zLabel);
                            subContainer.appendChild(item);
                            allProvCbs.push(cbox);

                            cbox.addEventListener('change', () => {
                                if (cbox.checked) selectedZones.add(zoneKey);
                                else selectedZones.delete(zoneKey);
                                updateParentCheckbox(provCb, allProvCbs);
                                updateSelectionText();
                            });
                            item.addEventListener('click', (e) => {
                                if (e.target !== cbox && e.target !== zLabel) {
                                    cbox.checked = !cbox.checked;
                                    if (cbox.checked) selectedZones.add(zoneKey);
                                    else selectedZones.delete(zoneKey);
                                    updateParentCheckbox(provCb, allProvCbs);
                                    updateSelectionText();
                                }
                            });

                        } else {
                            // ZONE WITH SUBZONES — expandable group
                            const wrapper = document.createElement('div');
                            wrapper.className = 'sub-zone-group';

                            // Zone header row (zone total + expand toggle)
                            const zoneHeader = document.createElement('div');
                            zoneHeader.className = 'zone-expandable-header';

                            const zoneCb = document.createElement('input');
                            zoneCb.type = 'checkbox';
                            zoneCb.value = zoneKey;
                            zoneCb.id = `zone_${prov}_${zoneName}`;
                            zoneCb.className = 'zone-cb';
                            zoneCb.checked = selectedZones.has(zoneKey);

                            const zoneLabel = document.createElement('label');
                            zoneLabel.htmlFor = zoneCb.id;
                            zoneLabel.textContent = zoneName;
                            zoneLabel.style.cursor = 'pointer';
                            zoneLabel.style.flex = '1';

                            const subToggle = document.createElement('button');
                            subToggle.className = 'toggle-zones-btn';
                            subToggle.textContent = '▶';
                            subToggle.title = `Ver ${subzones.length} sub-zonas`;

                            zoneHeader.appendChild(zoneCb);
                            zoneHeader.appendChild(zoneLabel);
                            zoneHeader.appendChild(subToggle);
                            wrapper.appendChild(zoneHeader);

                            // Subzones container
                            const subSubContainer = document.createElement('div');
                            subSubContainer.className = 'sub-zones-container';

                            const subzoneCbs = [];
                            subzones.forEach(szName => {
                                const szKey = `${prov}|${zoneName}|${szName}`;
                                const szItem = document.createElement('div');
                                szItem.className = 'checklist-item';

                                const szCb = document.createElement('input');
                                szCb.type = 'checkbox';
                                szCb.value = szKey;
                                szCb.id = `subzone_${prov}_${zoneName}_${szName}`;
                                szCb.className = 'zone-cb';
                                szCb.checked = selectedZones.has(szKey);

                                const szLabel = document.createElement('label');
                                szLabel.htmlFor = szCb.id;
                                szLabel.textContent = szName;
                                szLabel.style.cursor = 'pointer';
                                szLabel.style.flex = '1';

                                szItem.appendChild(szCb);
                                szItem.appendChild(szLabel);
                                subSubContainer.appendChild(szItem);
                                subzoneCbs.push(szCb);
                                allProvCbs.push(szCb);

                                szCb.addEventListener('change', () => {
                                    if (szCb.checked) selectedZones.add(szKey);
                                    else selectedZones.delete(szKey);
                                    updateParentCheckbox(zoneCb, subzoneCbs);
                                    updateParentCheckbox(provCb, allProvCbs);
                                    updateSelectionText();
                                });
                                szItem.addEventListener('click', (e) => {
                                    if (e.target !== szCb && e.target !== szLabel) {
                                        szCb.checked = !szCb.checked;
                                        if (szCb.checked) selectedZones.add(szKey);
                                        else selectedZones.delete(szKey);
                                        updateParentCheckbox(zoneCb, subzoneCbs);
                                        updateParentCheckbox(provCb, allProvCbs);
                                        updateSelectionText();
                                    }
                                });
                            });

                            wrapper.appendChild(subSubContainer);
                            subContainer.appendChild(wrapper);
                            allProvCbs.push(zoneCb);

                            // Zone checkbox → check/uncheck zone total + all subzones
                            zoneCb.addEventListener('change', () => {
                                if (zoneCb.checked) selectedZones.add(zoneKey);
                                else selectedZones.delete(zoneKey);
                                subzoneCbs.forEach(szCb => {
                                    szCb.checked = zoneCb.checked;
                                    if (zoneCb.checked) selectedZones.add(szCb.value);
                                    else selectedZones.delete(szCb.value);
                                });
                                updateParentCheckbox(provCb, allProvCbs);
                                updateSelectionText();
                            });
                            zoneHeader.addEventListener('click', (e) => {
                                if (e.target !== zoneCb && e.target !== zoneLabel && e.target !== subToggle) {
                                    zoneCb.checked = !zoneCb.checked;
                                    if (zoneCb.checked) selectedZones.add(zoneKey);
                                    else selectedZones.delete(zoneKey);
                                    subzoneCbs.forEach(szCb => {
                                        szCb.checked = zoneCb.checked;
                                        if (zoneCb.checked) selectedZones.add(szCb.value);
                                        else selectedZones.delete(szCb.value);
                                    });
                                    updateParentCheckbox(provCb, allProvCbs);
                                    updateSelectionText();
                                }
                            });
                            subToggle.onclick = (e) => {
                                e.stopPropagation();
                                subSubContainer.classList.toggle('expanded');
                                subToggle.textContent = subSubContainer.classList.contains('expanded') ? '▼' : '▶';
                            };
                        }
                    });

                    group.appendChild(subContainer);
                }

                if (toggleBtn && subContainer) {
                    toggleBtn.onclick = (e) => {
                        e.stopPropagation();
                        subContainer.classList.toggle('expanded');
                        toggleBtn.textContent = subContainer.classList.contains('expanded') ? '▲' : '▼';
                    };
                }

                provCb.addEventListener('change', () => {
                    const isChecked = provCb.checked;
                    allProvCbs.forEach(cb => {
                        cb.checked = isChecked;
                        if (isChecked) selectedZones.add(cb.value);
                        else selectedZones.delete(cb.value);
                    });
                    updateSelectionText();
                });

                header.addEventListener('click', (e) => {
                    if (e.target !== provCb && e.target !== toggleBtn && e.target !== provLabel) {
                        provCb.checked = !provCb.checked;
                        allProvCbs.forEach(cb => {
                            cb.checked = provCb.checked;
                            if (provCb.checked) selectedZones.add(cb.value);
                            else selectedZones.delete(cb.value);
                        });
                        updateSelectionText();
                    }
                });

                updateParentCheckbox(provCb, allProvCbs);
                container.appendChild(group);
            });

            updateSelectionText();
        }

        function toggleAllZones(checked) {
            document.querySelectorAll('.zone-cb').forEach(cb => {
                const group = cb.closest('.checklist-group');
                if (!group || group.style.display === 'none') return;
                cb.checked = checked;
                if (checked) selectedZones.add(cb.value);
                else selectedZones.delete(cb.value);
            });
            document.querySelectorAll('.prov-cb').forEach(cb => {
                const group = cb.closest('.checklist-group');
                if (!group || group.style.display === 'none') return;
                cb.checked = checked;
                cb.indeterminate = false;
            });
            updateSelectionText();
        }

        function updateParentCheckbox(parentCb, childrenCbs) {
            if (!childrenCbs.length) return;
            const allChecked = childrenCbs.every(cb => cb.checked);
            const someChecked = childrenCbs.some(cb => cb.checked);
            parentCb.checked = allChecked;
            parentCb.indeterminate = someChecked && !allChecked;
        }

        function updateSelectionText() {
            const count = document.getElementById('selectionCount');
            const triggerText = document.querySelector('#zoneDropdownTrigger span:first-child');
            count.textContent = `${selectedZones.size} seleccionadas`;

            if (selectedZones.size === 0) {
                triggerText.textContent = "Seleccionar Zonas...";
            } else if (selectedZones.size === 1) {
                const parts = Array.from(selectedZones)[0].split('|');
                const display = parts[2] || parts[1]; // subzone name or zone name
                triggerText.textContent = display.length > 20 ? display.substring(0, 20) + '...' : display;
            } else {
                triggerText.textContent = `${selectedZones.size} zonas seleccionadas`;
            }
        }

        function applyZoneSelection() {
            document.getElementById('zoneDropdownOverlay').classList.remove('active');
            drawChart();
        }

        function drawChart() {
            const opFilter = document.getElementById('operationSelect').value;

            if (selectedZones.size === 0) {
                if (chartInstance) chartInstance.destroy();
                return;
            }

            // Group data by date label
            const labelsMap = new Map();

            rawData.forEach(d => {
                // Key format: "Province|Zone|Subzone"
                const key = `${d.province}|${d.zone}|${d.subzone || ''}`;
                if (!selectedZones.has(key)) return;
                if (opFilter !== 'both' && d.operation !== opFilter) return;

                const label = d.date_record;
                if (!labelsMap.has(label)) {
                    const parts = d.date_record.split('-');
                    const sortKey = parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : d.date_record;
                    labelsMap.set(label, { label, sortKey, values: {} });
                }

                const dsKey = `${key}|${d.operation}`;
                labelsMap.get(label).values[dsKey] = d.total_properties;
            });

            const sortedEntries = Array.from(labelsMap.values()).sort((a, b) => a.sortKey.localeCompare(b.sortKey));
            const labels = sortedEntries.map(e => e.label);

            const datasets = [];
            let colorIndex = 0;

            selectedZones.forEach(sz => {
                const parts = sz.split('|');
                const prov = parts[0];
                const zone = parts[1];
                const subzone = parts[2] || '';

                const opsToDraw = opFilter === 'both' ? ['venta', 'alquiler'] : [opFilter];

                opsToDraw.forEach(op => {
                    const dsKey = `${sz}|${op}`;
                    const dsData = sortedEntries.map(e => e.values[dsKey] !== undefined ? e.values[dsKey] : null);

                    if (dsData.some(v => v !== null)) {
                        const color = COLORS[colorIndex % COLORS.length];
                        // Display: use subzone name if present, otherwise zone (or province for "toda la provincia")
                        let displayName;
                        if (subzone) {
                            displayName = `${subzone} (${zone})`;
                        } else if (zone === '(Toda la provincia)') {
                            displayName = prov;
                        } else {
                            displayName = zone;
                        }

                        datasets.push({
                            label: `${displayName} (${op === 'venta' ? 'Venta' : 'Alquiler'})`,
                            data: dsData,
                            borderColor: color,
                            backgroundColor: color + '1A',
                            borderWidth: 2,
                            pointBackgroundColor: '#1e293b',
                            pointBorderColor: color,
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: false,
                            tension: 0.3
                        });

                        colorIndex++;
                    }
                });
            });

            if (chartInstance) chartInstance.destroy();

            const ctx = document.getElementById('trendsChart').getContext('2d');
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Outfit', sans-serif";

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { font: { size: 12 }, boxWidth: 15 } },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f8fafc',
                            bodyColor: '#f8fafc',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            usePointStyle: true
                        }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                        y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' } }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }

        // Initialize
        init();
    </script>
</body>

</html>
